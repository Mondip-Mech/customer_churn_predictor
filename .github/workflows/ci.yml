name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run schema unit tests
        run: pytest tests/test_schema.py -v --tb=short

      - name: Run API integration tests
        run: pytest tests/test_api.py -v --tb=short
        # Note: model file not present in CI — tests that need the model
        # will use the degraded-mode fallback (health returns model_loaded=false)
        # Full model tests run only when final_churn_model.pkl is available
        continue-on-error: false

  # ── Job 2: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check api/ tests/ --ignore E501

  # ── Job 3: Build Docker image ───────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: churn-predictor-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          tags: churn-predictor-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: (Optional) Push to Docker Hub ───────────────────────────────────
  # Uncomment and add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN to repo secrets
