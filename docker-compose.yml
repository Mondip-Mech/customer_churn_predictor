services:
  # ── FastAPI prediction service ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./predictions.db:/app/predictions.db   # persist prediction log
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Streamlit dashboard ──────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── MLflow tracking server ────────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: churn-mlflow
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root ./mlruns
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped
